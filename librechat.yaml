version: 1.2.9
cache: true


# --- Seção da API Padrão da OpenAI (CORRIGIDO: Movido para o nível superior) ---
openAI:
  title: "OpenAI"
  apiKey: "${OPENAI_API_KEY}"
  titleModel: "gpt-5-nano"
  models:
    "gpt-5": {}
    "gpt-5-mini": {}
    "gpt-5-nano": {}

# ================================
# Memory
# ================================
memory:
  disabled: false
  validKeys: ["preferences","work_info","skills","interests","context","learned_facts"]
  tokenLimit: 10000
  personalize: true
  messageWindowSize: 10
  agent:
    provider: "openai"
    model: "gpt-5-nano"
    instructions: |
      You are the Hero Memory Manager for Ero Copper.
      Your job is to extract, normalize, and update user memory succinctly and safely. 
      Specifically for learned facts always ask the user if that information is relevant to be remembered.

      STRICT RULES:
      - Allowed keys: preferences, work_info, skills, interests, context, learned_facts
      - Store only stable, long-lived, useful facts. Keep values short and neutral.
      - Never store sensitive personal data, secrets, or third-party identifiers.
      - Prefer updates over duplicates. Remove outdated or contradicted info.
      - For temporary context, set an expiresAt or skip storing.
      OUTPUT: zero or one {key, value} pair to write; if not confident, output none.
    model_parameters:
      temperature: 0.1


# ================================
# Storage
# ================================
# # --- ESTRATÉGIA DE ARMAZENAMENTO DE ARQUIVOS ---
# # Define o serviço a ser usado para upload e armazenamento de arquivos.
# # O valor deve ser a string exata "azure_blob".
# fileStrategy: "azure_blob"
fileStrategy: "local"

# ========================
# Auth / Registration
# ========================
registration:
  socialLogins: ["openid"]
  allowedDomains:
    - "erobr.com"
    - "erocopper.com"
    - "ero.com"

# ================================
# INTERFACE (UI) - Otimizada
# ================================
interface:
  title: 'Hero'
  customWelcome: "Welcome to Hero! An Ero assisted intelligence model"
  # Temporary chat retention period in hours (2 days = 48 hours)
  temporaryChatRetention: 48
  mcpServers:
    placeholder: "MCP Servers"
  modelSelect: false
  agents: true
  sidePanel: true
  parameters: false
  presets: false
  prompts: true
  bookmarks: true
  multiConvo: true
  webSearch: true
  fileSearch: true
  runCode: true
  hideEndpoints:
    - openAI
    - azureOpenAI
    - anthropic
    - google
    - assistants
    - custom

# ================================
# RATE LIMITS
# ================================
rateLimits:
  fileUploads: { ipMax: 120, ipWindowInMinutes: 60, userMax: 60, userWindowInMinutes: 60 }
  conversationsImport: { ipMax: 30, ipWindowInMinutes: 60, userMax: 20, userWindowInMinutes: 60 }
  stt: { ipMax: 120, ipWindowInMinutes: 10, userMax: 60, userWindowInMinutes: 10, maxSecondsPerRequest: 180 }
  tts: { ipMax: 120, ipWindowInMinutes: 10, userMax: 60, userWindowInMinutes: 10, maxCharsPerRequest: 1200 }
  webSearch: { ipMax: 100, ipWindowInMinutes: 15, userMax: 40, userWindowInMinutes: 15 }
  actions: { ipMax: 200, ipWindowInMinutes: 60, userMax: 100, userWindowInMinutes: 60 }
  codeInterpreter: { ipMax: 60, ipWindowInMinutes: 60, userMax: 30, userWindowInMinutes: 60, maxTimeoutSeconds: 60 }
  imageGeneration: { ipMax: 60, ipWindowInMinutes: 60, userMax: 30, userWindowInMinutes: 60 }

# ================================
# OPENAI/AZURE SPEECH (STT/TTS) - VERSÃO COMPLETA
# ================================
speech:
  # --- Configurações da Interface (UI) ---
  # Habilita a aba de "Voz" na interface.
  speechTab: true
  # Ativa o modo de conversação contínua (o microfone continua ouvindo).
  conversationMode: true
  # Mostra opções avançadas de microfone na interface (ex: ajuste de sensibilidade).
  advancedMode: true

  # --- Configurações Gerais de Text-to-Speech (TTS) ---
  # Toca o áudio da resposta automaticamente.
  automaticPlayback: true
  # Velocidade da fala (1.0 = normal, 1.2 = 20% mais rápido, etc.).
  playbackRate: 1.0
  # Armazena em cache o áudio gerado para economizar chamadas de API em textos repetidos.
  cacheTTS: true

  # --- Configurações de Speech-to-Text (STT/Whisper) ---
  stt:
    # Transcreve automaticamente o áudio detectado.
    autoTranscribeAudio: true
    # Nível de decibéis para o microfone começar a capturar. Valores mais baixos (ex: -60) são mais sensíveis.
    decibelValue: -45
    # Segundos de silêncio antes de enviar o texto automaticamente para o chat (0 = desativado).
    autoSendText: 2
    
    # Provedor ativo para STT (Whisper)
    openai:
      apiKey: '${STT_API_KEY}'
      model: 'whisper-1'
      # (Opcional) Você pode especificar o idioma para melhorar a precisão da transcrição.
      # language: 'pt'

  # --- Configurações de Text-to-Speech (TTS) ---
  tts:
    # Define qual provedor usar. Deve corresponder a uma das seções abaixo ("openai" ou "azureOpenAI").
    engine: openai
    # Voz padrão para a interface. "onyx", "echo", e "fable" são vozes masculinas.
    voice: "onyx" # <-- ALTERADO

    # Provedor ATIVO para TTS
    openai:
      apiKey: '${TTS_API_KEY}'
      model: 'tts-1'
      # (Opcional) Você pode especificar o idioma para a síntese de voz.
      # language: 'pt'
      # Lista de vozes que aparecerão no menu de seleção da interface.
      voices: ['alloy', 'echo', 'fable', 'onyx', 'nova', 'shimmer']

