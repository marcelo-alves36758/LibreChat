# ================================
# OCR
# ================================
ocr:
  mistralModel: "${OCR_DEPLOYMENT_NAME}" 
  apiKey: "${OCR_API_KEY}"
  baseURL: "${OCR_BASEURL}"
  strategy: "azure_mistral_ocr"

# ========================
# Endpoints (Global Tool Config)
# ========================
endpoints:
  agents:
    disableBuilder: false
    recursionLimit: 50
    maxRecursionLimit: 100
    maxCitations: 30
    maxCitationsPerFile: 7
    minRelevanceScore: 0.45
    tools:
      order:
        - web_search
        - actions
        - file_search
        - ocr
        - execute_code
        - image_generation
        - artifacts
        - chain
      web_search:
        providerPriority: [serper, tavily, traversaal]
        firecrawl: true # <-- Apenas diz que a ferramenta está ATIVA
        reranker:
          enabled: true # <-- Apenas diz que o reranker está ATIVO
          providerPriority: [jina] # <-- CORREÇÃO: "jina" deve estar sem aspas e providerPriority é uma lista
          topN: 8
        maxResults: 16
      ocr:
        enabled: true
      execute_code:
        enabled: true
      image_generation:
        providers:
          - openai_images
          - dalle
