# ========================
modelSpecs:
  enforce: true
  prioritize: true
  list:
    - name: "hero"
      label: "Hero"
      default: true
      iconURL: ""
      description: "The most comum agent for internal activities"
      showIconInMenu: true
      showIconInHeader: true
      preset:
        endpoint: "agents"
        agent_id: "agent_YTU7ohnOfzEon8WEtdggp"

    - name: "hero-deep-research"
      label: "Hero Deep Research"
      iconURL: ""
      description: "The most complex agent for research activities"
      showIconInMenu: true
      showIconInHeader: true
      preset:
        endpoint: "agents"
        agent_id: "agent_0eaIxFnDQSnAcKlUShbhn"

    - name: "hero-prompt-trainer"
      label: "Hero Prompt Trainer"
      iconURL: ""
      description: "Playground Agent for supporint on how to use Generative AI"
      showIconInMenu: true
      showIconInHeader: true
      preset:
        endpoint: "agents"
        agent_id: "agent_giLGsVCYY18fvw_Wh9rLz"

# ================================
# File Upload Configuration
# ================================
fileConfig:
  endpoints:
    default:
      fileLimit: 10
      fileSizeLimit: 20
      totalSizeLimit: 100
      supportedMimeTypes:
        - "application/pdf"
        - "application/vnd.openxmlformats-officedocument.wordprocessingml.document"
        - "application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"
        - "application/vnd.openxmlformats-officedocument.presentationml.presentation"
        - "text/csv"
        - "text/plain"
        - "application/json"
        - "application/x-yaml"
        - "text/yaml"
        - "text/x-python"
        - "application/javascript"
        - "text/x-java-source"
        - "text/html"
        - "text/css"
        - "image/png"
        - "image/jpeg"
        - "image/webp"
        - "image/tiff"
        - "image/.*"
        - "audio/mpeg"
        - "audio/wav"
        - "audio/mp4"
  serverFileSizeLimit: 200
  avatarSizeLimit: 2
  imageGeneration:
    px: 1024
